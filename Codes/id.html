 <!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS Class</title>

    <style>
        .city {
            background-color: aqua;
            color: blueviolet;
            padding: 10px;
            margin-bottom: 10px;
        }
    </style>

</head>

<body>

    <div class="city">
        <h2>Riyadh</h2>
        <p>Riyadh is the capital city of KSA</p>
    </div>

    <div class="city">
        <h2>Cairo</h2>
        <p>Cairo is the capital city of Egypt</p>
    </div>

    <div class="city">
        <h2>Khartoum</h2>
        <p>Khartoum is the capital city of Sudan</p>
    </div>

</body>

</html>
