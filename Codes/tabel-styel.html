<!DOCTYPE html>
<html lang="en">
<head>
    <title>Styled Table</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 70%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
        }

        th {
            background-color: #007BFF;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }
    </style>

</head>
<body>

    <h2>This is an HTML Table Page</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Address</th>
            <th>Age</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Mohammed</td>
            <td>mohammed@gmail.com</td>
            <td>Riyadh</td>
            <td>25</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Ali</td>
            <td>ali@gmail.com</td>
            <td>Jeddah</td>
            <td>30</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Fahad</td>
            <td>fahad@gmail.com</td>
            <td>Dammam</td>
            <td>28</td>
        </tr>

    </table>

</body>
</html>
