<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rowspan Example</title>

<style>
    table {
        border-collapse: collapse;
        font-family: "Times New Roman", serif;
        font-size: 28px;
    }

    th, td {
        border: 3px solid blue;
        padding: 10px 20px;
        text-align: left;
    }

    th {
        font-weight: bold;
    }
</style>
</head>

<body>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
    </tr>

    <tr>
        <td rowspan="2">11</td>
        <td>Mohammed</td>
        <td>19</td>
    </tr>

    <tr>
        <td>22</td>
        <td>Ali</td>
    </tr>
</table>

</body>
</html>
