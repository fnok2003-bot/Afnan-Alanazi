<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Link Colors</title>

<style>
    a:link {
        color: blue;
    }

    a:visited {
        color: purple;
    }

    a:hover {
        color: red;
    }

    a:active {
        color: yellow;
    }
</style>

</head>

<body>

<h2>Link Colors</h2>

<p>Here is a paragraph to link color page</p>

<a href="https://google.com" target="_blank">Go to Google</a>

</body>
</html>
