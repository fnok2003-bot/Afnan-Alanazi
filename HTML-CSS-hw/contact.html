<!DOCTYPE html>
<html>

<head>
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="table.html">Table</a>
        <a href="contact.html">Contact</a>
    </div>

    <h1>Contact Me</h1>

    <form>

        <label>Name:</label>
        <input type="text">
        <br><br>

        <label>Email:</label>
        <input type="email">
        <br><br>

        <label>Password:</label>
        <input type="password">
        <br><br>

        <label>Gender:</label>

        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female

        <br><br>

        <label>Skills:</label>

        <input type="checkbox"> HTML
        <input type="checkbox"> CSS
        <input type="checkbox"> JavaScript

        <br><br>

        <label>Country:</label>

        <select>
            <option>Saudi Arabia</option>
            <option>UAE</option>
            <option>Egypt</option>
        </select>

        <br><br>

        <label>City:</label>

        <input list="cities">

        <datalist id="cities">
            <option value="Riyadh">
            <option value="Jeddah">
            <option value="Dammam">
        </datalist>

        <br><br>

        <label>Message:</label>
        <br>

        <textarea rows="5" cols="30"></textarea>

        <br><br>

        <button type="submit">Submit</button>

        <button type="reset">Reset</button>

    </form>

</body>

</html>
